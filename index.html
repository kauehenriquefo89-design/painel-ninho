<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard — Espaço Ninho</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#C4622D;--brand-dark:#9e4e24;--brand-light:#f0e4dc;--bg:#f5f1ef;--card:#fff;--border:#e8ddd8;--text:#2d1f17;--muted:#8b6b5a;--subtle:#c9b5aa;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--gold:#d97706;--purple:#7c3aed}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:3px}
#hdr{background:var(--brand);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
#hdr-top{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;gap:8px;flex-wrap:wrap}
#brand-wrap{display:flex;align-items:center;gap:10px}
#logo{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4)}
#bt{font-weight:800;font-size:15px;color:#fff;letter-spacing:-.2px}
#bs{font-size:10px;color:rgba(255,255,255,.75);margin-top:1px}
#hdr-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
#hkpis{display:flex;gap:5px;flex-wrap:wrap}
.hk{background:rgba(0,0,0,.2);border-radius:7px;padding:4px 10px}
.hkl{font-size:10px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.4px}
.hkv{font-family:'Courier New',monospace;font-size:13px;font-weight:700;color:#fff}
#sync-badge{background:rgba(0,0,0,.2);border-radius:7px;padding:5px 11px;display:none;align-items:center;gap:7px}
#sync-dot{width:7px;height:7px;border-radius:50%;transition:all .3s}
#sync-dot.live{background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pulse 2s ease-in-out infinite}
#sync-dot.err{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#sync-txt{font-size:10px;color:rgba(255,255,255,.9)}
.hdr-btn{display:flex;align-items:center;gap:5px;border:1.5px solid rgba(255,255,255,.5);border-radius:7px;padding:5px 12px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;transition:all .15s;white-space:nowrap}
.hdr-btn:hover{background:rgba(255,255,255,.25)}
#source-bar{background:rgba(0,0,0,.15);padding:3px 20px;display:flex;align-items:center;gap:12px;font-size:10px;color:rgba(255,255,255,.8)}
.src-badge{display:flex;align-items:center;gap:5px}
.src-dot{width:6px;height:6px;border-radius:50%;background:#94a3b8}.src-dot.ok{background:#4ade80}
#tabs{display:flex;gap:0;padding:0 12px;background:var(--brand-dark);overflow-x:auto}
.tb{padding:9px 14px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:rgba(255,255,255,.65);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tb.a{color:#fff;border-bottom-color:#fff}.tb:hover:not(.a){color:rgba(255,255,255,.85)}
#fbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.flbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.mfb{padding:5px 13px;border-radius:6px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s}
.mfb.a{background:var(--brand);border-color:var(--brand);color:#fff}
.date-inputs{display:flex;align-items:center;gap:6px}
.date-inputs input{padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;color:var(--text)}
.date-inputs input:focus{outline:none;border-color:var(--brand)}
.fbtn{padding:4px 12px;border-radius:6px;border:none;background:var(--brand);color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
#content{padding:16px 20px;max-width:1600px;margin:0 auto}
.sec{display:none}.sec.a{display:block}
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px;padding:24px}
.splash-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;box-shadow:0 4px 20px rgba(196,98,45,.3)}
.splash-title{font-size:22px;font-weight:800;color:var(--text)}
.splash-sub{font-size:13px;color:var(--muted);line-height:1.7;max-width:480px}
.splash-btn{display:inline-flex;align-items:center;gap:8px;background:var(--brand);border:none;border-radius:10px;padding:13px 28px;color:#fff;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 14px rgba(196,98,45,.35);transition:all .2s}
.splash-btn:hover{transform:translateY(-1px)}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:9px;padding:14px 18px;margin:8px 0;font-size:12px;color:#991b1b;line-height:1.6}
.cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.card{background:var(--card);border-radius:10px;padding:13px 16px;flex:1;min-width:150px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid var(--brand)}
.cl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-weight:600}
.cv{font-family:'Courier New',monospace;font-size:20px;font-weight:700;color:var(--text)}
.cs{font-size:11px;color:var(--muted);margin-top:2px}.cp{font-size:11px;font-weight:700;margin-top:2px}
.panel{background:var(--card);border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px}
.pt{font-weight:700;font-size:14px;color:var(--text);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.pt-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:9px;background:var(--brand-light);color:var(--brand);white-space:nowrap}
.prow{display:flex;gap:12px;margin-bottom:12px}.prow>.panel{flex:1;margin-bottom:0}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#faf7f5;font-weight:700;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;border-bottom:2px solid var(--border);white-space:nowrap;text-align:left}
th.r{text-align:right}td{padding:7px 10px;border-bottom:1px solid #f8f3f1;font-size:12px;color:var(--text)}
td.r{text-align:right}tr:hover td{background:#fdf9f7}
tr:nth-child(even) td{background:#fdf7f5}
td.mn{font-family:'Courier New',monospace;font-size:11px}td.b{font-weight:700}
td.rd{color:var(--red)}td.gn{color:var(--green)}
.bdg{display:inline-block;padding:2px 7px;border-radius:9px;font-size:9px;font-weight:700}
.bg{background:#dcfce7;color:#166534}.by{background:#fef3c7;color:#92400e}.br{background:#fee2e2;color:#991b1b}.bo{background:#fff7ed;color:#9a3412}
.alrt{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:9px 13px;margin-bottom:10px;display:flex;gap:9px;align-items:flex-start;font-size:11px;color:#9a3412}
.fltrs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.fb{padding:4px 11px;border-radius:14px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:10px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s}
.fb.a{background:var(--brand);border-color:var(--brand);color:#fff}
.cwrap{width:100%;overflow-x:auto}
.note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
.dsp td{border-top:2px solid var(--border)!important;background:#faf7f5!important}
.section-title{font-size:11px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;padding-bottom:4px;border-bottom:2px solid var(--brand-light)}
.no-data{text-align:center;padding:32px;color:var(--muted);font-size:12px}
.excel-needed{background:var(--brand-light);border:1px dashed var(--brand);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--brand-dark);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.src-info{background:#f8f7f5;border-left:3px solid var(--brand-light);border-radius:0 6px 6px 0;padding:8px 12px;font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5}

.dre-toggle{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.dre-tb{padding:6px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s}
.dre-tb.a{background:var(--brand);border-color:var(--brand);color:#fff}
</style>
</head>

<script>

const API    = "/api/api";
const STORE  = "/api/store";
const PLUGGY = "/api/pluggy";
const POLL_MS = 300000;
const TAX = {pis:0.0065, cofins:0.03, iss:0.05};
const BASE_PRESUMIDA = 0.32; // Lucro Presumido: base de cálculo para serviços

// Deduções mensais sobre faturamento (PIS/COFINS/ISS)
function calcDeducoesFiscais(rb){
  const pis=rb*TAX.pis, cofins=rb*TAX.cofins, iss=rb*TAX.iss;
  return{pis, cofins, iss, total:pis+cofins+iss};
}

// CSLL/IRPJ: Lucro Presumido — base 32%, apuração trimestral
// rb_trimestral: soma da receita bruta dos 3 meses
function calcCsllIrpj(rb_trimestral){
  const base = rb_trimestral * BASE_PRESUMIDA;
  const csll = base * 0.09;
  const irpj = base * 0.15;
  const adicional = base > 60000 ? (base - 60000) * 0.10 : 0;
  const total = csll + irpj + adicional;
  return { base, csll, irpj, adicional, total, mensal: total / 3 };
}

// Compatibilidade: quando não há contexto trimestral, estima com rb*3
function calcImpostos(rb){
  const ded=calcDeducoesFiscais(rb);
  const tri=calcCsllIrpj(rb*3);
  return{pis:ded.pis,cofins:ded.cofins,iss:ded.iss,csll:tri.csll/3,irpj:tri.irpj/3,adicional:tri.adicional/3,total:ded.total+tri.total/3};
}

// ── DRE CATEGORY GROUPING (based on real Conta Azul categories) ──
function getGrupoCp(cat) {
  const c = (cat||"").toLowerCase();
  if (c.includes("repasse")) return "repasse";
  if (c.includes("marketing") || c.includes("publicidade") || c.includes("brinde") || c.includes("comerci")) return "comercial";
  if (c.includes("rendimento") || c.includes("aplicacao") || c.includes("aplicação")) return "rendimento";
  if (c.includes("emprestimo") || c.includes("empréstimo") || c.includes("divida") || c.includes("dívida") || c.includes("financiamento") || c.includes("banco") && c.includes("emprést")) return "emprestimo";
  if (c.includes("tarifa") || c.includes("bancaria") || c.includes("juros") || c.includes("iof") || c.includes("financ")) return "financeiro";
  return "administrativo"; // default: Pró-labore, Aluguel, Salários, etc.
}

let APP=null, CA_DATA=null, XL_DATA=null;
const SALDO_INICIAL_DEZ = 40002.72; // Saldo bancário em Dez/25
let CUR_TAB="dre", CUR_MES="TOTAL", MESES=[], PROF_DISC="Todas";
let pollTimer=null, fileHandle=null, xlLastMod=null, timerXL=null, xlUploaded=false, isLoadingCA=false;
let PLUGGY_DATA=null, pluggyConnected=false;
let OFX_DATA=null; // dados do extrato bancário OFX
let dtFrom=null, dtTo=null;
let MESES_SEL=[]; // meses selecionados para comparativo DRE

const fR=v=>{if(v==null||isNaN(v))return"—";const ng=v<0,a=Math.abs(v);const s=a.toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0});return ng?"(R$ "+s+")":"R$ "+s};
const fP=(v,d=1)=>v==null||isNaN(v)?"—":(v*100).toFixed(d)+"%";
const clr=v=>v>=0?"var(--green)":"var(--red)";
const bdg=v=>{const c=v>=0.5?"bg":v>=0.25?"by":"br";return`<span class="bdg ${c}">${fP(v)}</span>`};
const COLS=["#C4622D","#7c3aed","#0891b2","#16a34a","#d97706","#dc2626","#6366f1","#0d9488","#ea580c","#4f46e5","#65a30d","#b45309","#0369a1","#15803d","#7e22ce","#c2410c"];
const monthLabel=m=>{if(!m||m==="TOTAL")return"Total";const[y,mo]=m.split("-");return["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][+mo-1]+"/"+String(y).slice(2)};
function toNum(v){if(typeof v==="number")return v;if(typeof v==="string"&&v.startsWith("="))return 0;const s=String(v||"");if(/\d\.\d{3},\d{2}/.test(s))return parseFloat(s.replace(/\./g,"").replace(",","."))||0;return parseFloat(s.replace(/[^\d,.\-]/g,"").replace(",","."))||0}
// Retorna o trimestre de um mês: "2026-01" → "2026-Q1"
function getQuarter(mes){
  if(!mes)return null;
  const[y,m]=mes.split("-").map(Number);
  return y+"-Q"+Math.ceil(m/3);
}

// Recalcula CSLL/IRPJ com base trimestral correta (Lucro Presumido)
// Chamado após buildMonth processar todos os meses
function recalcQuarterlyTax(byMes, allMeses){
  // Agrupa meses por trimestre
  const quarters={};
  allMeses.forEach(mes=>{
    const q=getQuarter(mes);
    if(!quarters[q])quarters[q]=[];
    quarters[q].push(mes);
  });

  // Para cada trimestre: calcula imposto sobre receita total e redistribui mensalmente
  Object.entries(quarters).forEach(([q,meses])=>{
    const rb_trim=meses.reduce((a,m)=>a+(byMes[m]?.rl||0),0);
    const tri=calcCsllIrpj(rb_trim);
    const n=meses.length;

    meses.forEach(mes=>{
      const d=byMes[mes];if(!d)return;
      // Atualiza provisão mensal = trimestral / nº meses com dados
      d.impostos.csll=tri.csll/n;
      d.impostos.irpj=tri.irpj/n;
      d.impostos.adicional=tri.adicional/n;
      d.impostos.total=d.impostos.pis+d.impostos.cofins+d.impostos.iss+d.impostos.csll+d.impostos.irpj+d.impostos.adicional;
      d.impostos.base_presumida=tri.base;
      d.impostos.rb_trimestral=rb_trim;
      d.impostos.trimestre=q;
      // Recalcula Lucro Líquido com imposto correto
      const csll_irpj=d.impostos.csll+d.impostos.irpj+d.impostos.adicional;
      d.ll=d.ebt-csll_irpj;
    });
  });
}

function toYYYYMM(v){if(!v)return null;if(v instanceof Date||Object.prototype.toString.call(v)==="[object Date]"){const d=new Date(v);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}const s=String(v);const m1=s.match(/^(\d{4})-(\d{2})/);if(m1)return m1[1]+"-"+m1[2];const m2=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m2)return m2[3]+"-"+m2[2].padStart(2,"0");return null}

// ── FILTER ──
function getActiveMeses(){
  let m=[...MESES];
  if(dtFrom)m=m.filter(x=>x>=dtFrom);
  if(dtTo)m=m.filter(x=>x<=dtTo);
  return m;
}

function getActiveData(){
  if(!APP||!APP.byMes)return null;
  const meses=getActiveMeses();
  // Se apenas 1 mês selecionado via botão
  if(CUR_MES!=="TOTAL"&&MESES.includes(CUR_MES)&&!dtFrom&&!dtTo){
    return APP.byMes[CUR_MES]||APP.byMes["TOTAL"];
  }
  // Agrega os meses ativos (respeita filtro De/Até)
  return buildAggregate(meses);
}

function buildAggregate(meses){
  if(!meses||!meses.length)return APP.byMes["TOTAL"];
  if(meses.length===MESES.length&&!dtFrom&&!dtTo)return APP.byMes["TOTAL"];

  const agg={mes:"AGG",rl:0,rb_excel:0,desc_excel:0,recebido:0,abertoCR:0,rep:0,
    desp_comercial:0,desp_admin:0,desp_financeiro:0,rendimentos:0,emprestimo:0,
    at:0,pac:0};
  const catMap={},catCAaggMap={},cpCatMap={},profMap={},discMap={},famMap={};

  meses.forEach(m=>{
    const d=APP.byMes[m];if(!d)return;
    ["rl","rb_excel","desc_excel","recebido","abertoCR","rep","desp_comercial","desp_admin","desp_financeiro","rendimentos","emprestimo","at"].forEach(k=>agg[k]+=(d[k]||0));
    (d.categorias||[]).forEach(c=>{if(!catMap[c.n])catMap[c.n]={n:c.n,faturado:0,recebido:0,aberto:0};catMap[c.n].faturado+=c.faturado;catMap[c.n].recebido+=c.recebido;catMap[c.n].aberto+=c.aberto});
    (d.categoriasCA||[]).forEach(c=>{if(!catCAaggMap[c.n])catCAaggMap[c.n]={n:c.n,faturado:0,recebido:0,aberto:0};catCAaggMap[c.n].faturado+=c.faturado;catCAaggMap[c.n].recebido+=c.recebido;catCAaggMap[c.n].aberto+=c.aberto});
    (d.cpCategorias||[]).forEach(c=>{const k=c.n+"|"+c.grupo;if(!cpCatMap[k])cpCatMap[k]={n:c.n,grupo:c.grupo,valor:0};cpCatMap[k].valor+=c.valor});
    (d.profissionais||[]).forEach(p=>{const k=p.n+"||"+p.d;if(!profMap[k])profMap[k]={...p,rb:0,rl:0,rep:0,at:0};profMap[k].rb+=p.rb;profMap[k].rl+=p.rl;profMap[k].rep+=p.rep;profMap[k].at+=p.at});
    (d.disciplinas||[]).forEach(x=>{if(!discMap[x.n])discMap[x.n]={...x,rl:0,rep:0,at:0,pac:0};discMap[x.n].rl+=x.rl;discMap[x.n].rep+=x.rep;discMap[x.n].at+=x.at;discMap[x.n].pac+=x.pac});
    // famMap handled after loop from atRows
  });

  // Recalcula derivados
  agg.rf=agg.rendimentos-agg.desp_financeiro;
  agg.lucro_bruto=agg.rl-agg.rep;
  agg.lucro_operacional=agg.lucro_bruto-agg.desp_comercial-agg.desp_admin;
  agg.lucro_liquido_antes=agg.lucro_operacional+agg.rf;
  agg.lucro_final=agg.lucro_liquido_antes; // amortização não entra no resultado
  // buildAggregate: soma os impostos mensais (não recalcular sobre total)
  const aggImpSum={pis:0,cofins:0,iss:0,csll:0,irpj:0,adicional:0,total:0};
  meses.forEach(m=>{const i=APP.byMes[m]?.impostos||{};
    aggImpSum.pis+=(i.pis||0);aggImpSum.cofins+=(i.cofins||0);aggImpSum.iss+=(i.iss||0);
    aggImpSum.csll+=(i.csll||0);aggImpSum.irpj+=(i.irpj||0);aggImpSum.adicional+=(i.adicional||0);
    aggImpSum.total+=(i.total||0);
  });
  agg.impostos=aggImpSum;
  agg.ll=agg.lucro_final-agg.impostos.total;
  agg.tAt=agg.at>0?agg.rl/agg.at:0;
  agg.categorias=Object.values(catMap).sort((a,b)=>b.faturado-a.faturado);
  agg.categoriasCA=Object.values(catCAaggMap).sort((a,b)=>b.faturado-a.faturado);
  agg.cpCategorias=Object.values(cpCatMap).sort((a,b)=>b.valor-a.valor);
  agg.profissionais=Object.values(profMap).map(p=>{const mc2=p.rl-p.rep,i2=calcImpostos(p.rl),ll2=mc2-i2.total;return{...p,mc:mc2,imp:i2.total,ll:ll2,mcP:p.rl>0?mc2/p.rl:0,repP:p.rl>0?p.rep/p.rl:0,llP:p.rl>0?ll2/p.rl:0,tAt:p.at>0?p.rl/p.at:0}}).sort((a,b)=>b.rl-a.rl);
  agg.disciplinas=Object.values(discMap).map(d=>{const mc2=d.rl-d.rep,i2=calcImpostos(d.rl),ll2=mc2-i2.total;return{...d,mc:mc2,imp:i2.total,ll:ll2,mcP:d.rl>0?mc2/d.rl:0,repP:d.rl>0?d.rep/d.rl:0,llP:d.rl>0?ll2/d.rl:0,tAt:d.at>0?d.rl/d.at:0,tPac:d.pac>0?d.rl/d.pac:0}}).sort((a,b)=>b.rl-a.rl);
  // Rebuild familias and pac from raw atRows filtered by meses
  const aggAtRows=(APP.atRows||[]).filter(r=>meses.includes(r.mes));
  agg.pac=new Set(aggAtRows.map(r=>r.paciente).filter(Boolean)).size;
  agg.tPac=agg.pac>0?agg.rl/agg.pac:0;
  const aggFamMap={};
  aggAtRows.forEach(r=>{const fn=r.familia||"Sem família";if(!aggFamMap[fn])aggFamMap[fn]={n:fn,rl:0,at:0,pacs:new Set()};aggFamMap[fn].rl+=r.rl;aggFamMap[fn].at++;aggFamMap[fn].pacs.add(r.paciente)});
  agg.familias=Object.values(aggFamMap).map(f=>({n:f.n,rl:f.rl,at:f.at,pac:f.pacs.size,tAt:f.at>0?f.rl/f.at:0,tPac:f.pacs.size>0?f.rl/f.pacs.size:0})).sort((a,b)=>b.rl-a.rl);
  return agg;
}

// ── NORMALIZADORES ──
function isTransfer(item){
  const cat=(item.categorias?.[0]?.nome||item.descricao||"").toLowerCase();
  return cat.includes("transfer") || cat.includes("transf.") ||
         (item.tipo||"").toLowerCase().includes("transfer");
}
function normalizarCR(item){
  if(isTransfer(item))return null;
  const cat=item.categorias?.[0]?.nome||item.descricao||"Sem categoria";
  const faturado=toNum(item.total||0),recebido=toNum(item.pago||0);
  // DRE: SOMENTE data_competencia (nunca data_vencimento — seria regime de caixa)
  const mes=toYYYYMM(item.data_competencia);
  // Fluxo de Caixa: data_vencimento (regime de caixa, separado da DRE)
  const mesFC=toYYYYMM(item.data_vencimento);
  if(!mes)return null; // descarta lançamentos sem data de competência
  return{mes,mesFC,cat,faturado,recebido,aberto:faturado-recebido};
}
function normalizarCP(item){
  if(isTransfer(item))return null;
  const cat=item.categorias?.[0]?.nome||item.descricao||"Sem categoria";
  const original=toNum(item.total||0),pago=toNum(item.pago||0);
  // DRE: SOMENTE data_competencia
  const mes=toYYYYMM(item.data_competencia);
  // Fluxo de Caixa: data_vencimento
  const mesFC=toYYYYMM(item.data_vencimento);
  if(!mes)return null; // descarta lançamentos sem data de competência
  const grupo=getGrupoCp(cat);
  return{mes,mesFC,cat,grupo,original,pago,aberto:original-pago};
}

// ── NORMALIZADORES PARA FLUXO DE CAIXA (regime caixa — data vencimento) ──
// Separados dos normalizadores da DRE para não contaminar regimes
function normalizarCRfc(item){
  if(isTransfer(item))return null;
  const cat=item.categorias?.[0]?.nome||item.descricao||"Sem categoria";
  const recebido=toNum(item.pago||0);
  const faturado=toNum(item.total||0);
  // FC REALIZADO: usa data_pagamento (data real do recebimento)
  // Se não tem data_pagamento ou valor pago = 0, não entra no fluxo
  if(recebido<=0)return null;
  const mes=toYYYYMM(item.data_pagamento||item.data_vencimento);
  if(!mes)return null;
  return{mes,cat,recebido,faturado,aberto:faturado-recebido};
}
function normalizarCPfc(item){
  if(isTransfer(item))return null;
  const cat=item.categorias?.[0]?.nome||item.descricao||"Sem categoria";
  const pago=toNum(item.pago||0);
  const original=toNum(item.total||0);
  // FC REALIZADO: usa data_pagamento (data real do pagamento)
  // Se não tem valor pago, não entra no fluxo
  if(pago<=0)return null;
  const mes=toYYYYMM(item.data_pagamento||item.data_vencimento);
  if(!mes)return null;
  const grupo=getGrupoCp(cat);
  return{mes,cat,grupo,pago,original,aberto:original-pago};
}

// ── EXCEL ──
// Planilha: "Relação geral"
// Colunas: Data Atendimento | Horário | Procedimento | Família | Paciente | Profissional | Valor | Desconto | Valor a Receber | Repasse | Valor Profissional
function xlsxToObjects(wb,nm){
  const ws=wb.Sheets[nm];if(!ws)return[];
  const raw=window.XLSX.utils.sheet_to_json(ws,{defval:""});
  // Normaliza chaves: remove espaços extras e caracteres invisíveis
  return raw.map(r=>{
    const out={};
    Object.entries(r).forEach(([k,v])=>{out[k.trim()]=v;});
    return out;
  });
}
function processExcel(wb){
  // Aceita "Relação geral" ou "Base_Atendimentos"
  const sheetName=wb.SheetNames.find(n=>n.includes("Relação")||n.includes("Relacao")||n.includes("Base_Atend"))||wb.SheetNames[0];
  const rows=xlsxToObjects(wb,sheetName);
  if(!rows.length)return null;
  return{at:rows,sheetName};
}
function parseAtRow(r){
  // Suporte ao formato "Relação geral" e ao formato "Base_Atendimentos"
  const data=r["Data Atendimento"]||r["data_atendimento"];
  const proc=String(r["Procedimento"]||r["Disciplina"]||"").trim();
  const familia=(String(r["Família"]||r["Familia"]||r["família"]||"").trim().replace(/\s+/g," "))||"Sem família";
  const paciente=String(r["Paciente"]||"").trim();
  const prof=String(r["Profissional"]||"").trim();
  // Valor bruto
  const rb=toNum(r["Valor"]||r["Valor Bruto"]||0);
  const desc=toNum(r["Desconto"]||0);
  // Receita Clínica: "Valor a Receber" pode ser fórmula → usa Valor - Desconto
  let rl=toNum(r["Valor a Receber"]||r["Receita Clínica"]||r["Receita Clinica"]||0);
  if(!rl&&rb)rl=rb-desc;
  // Repasse
  const rep=toNum(r["Valor Profissional"]||r["Repasse Profissional"]||0);
  const mes=toYYYYMM(data);
  return{mes,paciente,familia,prof,disc:proc,rb,rl,rep};
}

// ── OFX: upload e parse do extrato bancário ──────────────────────────────
function parseOFX(text){
  // Remove headers e pega só o XML/SGML
  const txns=[];
  // Suporte a OFX clássico (SGML) e moderno (XML)
  const stmtTrn=/<STMTTRN>([\s\S]*?)<\/STMTTRN>/gi;
  let match;
  while((match=stmtTrn.exec(text))!==null){
    const block=match[1];
    const get=(tag)=>{const m=new RegExp(`<${tag}>([^<]+)`,'i').exec(block);return m?m[1].trim():null;};
    const trntype=get('TRNTYPE')||'';
    const dtposted=get('DTPOSTED')||'';
    const trnamt=parseFloat(get('TRNAMT')||'0');
    const memo=get('MEMO')||get('NAME')||'';
    if(!dtposted||isNaN(trnamt))continue;
    // Converte data OFX: 20260115 → 2026-01-15
    const ano=dtposted.slice(0,4), mes=dtposted.slice(4,6), dia=dtposted.slice(6,8);
    const date=`${ano}-${mes}-${dia}`;
    txns.push({date, amount:trnamt, description:memo, type:trnamt>=0?'CREDIT':'DEBIT'});
  }
  return txns;
}

async function loadOFX(){
  try{
    const [fh]=await window.showOpenFilePicker({types:[{description:"Extrato OFX",accept:{"application/x-ofx":[".ofx",".OFX"]}}]});
    const file=await fh.getFile();
    const text=await file.text();
    const txns=parseOFX(text);
    if(!txns.length){alert("Nenhuma transação encontrada no arquivo OFX.");return;}
    OFX_DATA={transactions:txns,total:txns.length,fileName:file.name,uploadedAt:new Date().toISOString()};
    document.getElementById("btn-ofx").textContent="🏦 "+file.name.slice(0,15)+"...";
    document.getElementById("btn-ofx").style.borderColor="rgba(74,222,128,.7)";
    // Salva no servidor via store
    await saveOFXToServer(OFX_DATA);
    if(APP)processData();
    console.log("OFX carregado:",txns.length,"transações");
  }catch(e){
    if(e.name!=="AbortError")alert("Erro ao ler OFX: "+e.message);
  }
}

async function saveOFXToServer(data){
  try{
    await fetch("/api/store?action=save_ofx",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });
  }catch(e){console.warn("Falha ao salvar OFX no servidor:",e.message);}
}

async function loadOFXFromServer(){
  try{
    const r=await fetch("/api/store?action=load_ofx");
    if(!r.ok)return;
    const d=await r.json();
    if(d&&d.transactions&&d.transactions.length){
      OFX_DATA=d;
      document.getElementById("btn-ofx").textContent="🏦 Extrato ✓";
      document.getElementById("btn-ofx").style.borderColor="rgba(74,222,128,.7)";
      console.log("OFX carregado do servidor:",d.total,"transações");
    }
  }catch(e){console.warn("loadOFXFromServer:",e.message);}
}

async function openPluggyWidget(){
  try{
    // Busca connect token
    const r=await fetch(PLUGGY+"?action=connect_token");
    if(!r.ok){
      const txt=await r.text();
      alert("Erro HTTP "+r.status+": "+txt.slice(0,200));
      return;
    }
    const d=await r.json();
    if(!d.accessToken){alert("Erro ao gerar token Pluggy: "+(d.error||JSON.stringify(d)));return;}

    // Carrega o widget do Pluggy dinamicamente
    if(!window.PluggyConnect){
      // Tenta carregar o widget Pluggy de diferentes URLs
      const cdnUrls=[
        "https://cdn.pluggy.ai/pluggy-connect/latest/pluggy-connect.js",
        "https://cdn.pluggy.ai/pluggy-connect/v2.7.0/pluggy-connect.js",
      ];
      let loaded=false;
      for(const url of cdnUrls){
        try{
          await new Promise((resolve,reject)=>{
            const s=document.createElement("script");
            s.src=url;
            s.onload=()=>{loaded=true;resolve();};
            s.onerror=reject;
            document.head.appendChild(s);
          });
          if(loaded)break;
        }catch(e){console.warn("CDN falhou:",url);}
      }
      if(!loaded)throw new Error("Não foi possível carregar o widget Pluggy. Verifique sua conexão.");
    }

    const PluggyConnectClass = window.PluggyConnect || window.pluggyConnect;
    if(!PluggyConnectClass){
      alert("Widget Pluggy não carregado. Verifique sua conexão.");
      return;
    }
    const pluggyConnect=new PluggyConnectClass({
      connectToken: d.accessToken,
      onSuccess: async ({item})=>{
        // Salva o itemId no servidor
        await fetch(PLUGGY+"?action=save_item",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({itemId:item.id})
        });
        document.getElementById("btn-bank").textContent="🏦 Carregando...";
        await loadPluggyTransactions();
        alert("✅ Conta bancária conectada com sucesso!");
      },
      onError: (e)=>{console.error("Pluggy widget error:",e);},
      onClose: ()=>{console.log("Pluggy widget fechado");},
    });
    pluggyConnect.init();
  }catch(e){
    console.error("openPluggyWidget erro completo:",e);
    alert("Erro ao conectar banco: "+(e?.message||e?.toString()||JSON.stringify(e)||"sem mensagem"));
  }
}

// Upload processado para Netlify Blobs (compartilhado com todos os visitantes)
async function uploadToStore(atRowsData, fileName){
  try{
    const r=await fetch(STORE+"?action=save",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({atRows:atRowsData,fileName})
    });
    const d=await r.json();
    if(d.ok){
      console.log("Store: salvo",d.totalRows,"registros");
      xlUploaded=true;
      updateUploadBadge(d.totalRows,d.meses);
      return true;
    }
    console.warn("Blobs save error:",d.error);
    return false;
  }catch(e){console.error("uploadToStore:",e.message);return false;}
}

// Carrega dados da planilha do Blob (para visitantes sem Excel)
async function loadFromStore(){
  try{
    const r=await fetch(STORE+"?action=load");
    if(r.status===404)return false;
    if(!r.ok)return false;
    const d=await r.json();
    if(!d.atRows||!d.atRows.length)return false;
    // Dados já processados — armazena diretamente como atRows prontos
    XL_DATA={at:d.atRows,sheetName:"(servidor)",preProcessed:true};
    xlUploaded=true;
    updateUploadBadge(d.totalRows,d.meses,d.uploadedAt,d.fileName);
    updateSourceBar();
    return true;
  }catch(e){console.error("loadFromStore:",e.message);return false;}
}

function updateUploadBadge(totalRows,meses,uploadedAt,fileName){
  const btn=document.getElementById("btn-excel");
  if(btn){
    const mesesStr=meses&&meses.length?meses.map(m=>{const[y,mo]=m.split("-");return["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][+mo-1]+"/"+String(y).slice(2)}).join(", "):"";
    const dateStr=uploadedAt?new Date(uploadedAt).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
    btn.textContent="📊 "+totalRows+" atend.";
    btn.style.borderColor="rgba(74,222,128,.7)";
    btn.title=(fileName||"Excel")+(dateStr?" · "+dateStr:"")+(mesesStr?" · "+mesesStr:"");
  }
}

async function connectExcel(){
  if(!window.showOpenFilePicker){alert("Use Chrome ou Edge para o live sync.");return;}
  try{
    const[h]=await window.showOpenFilePicker({types:[{description:"Excel",accept:{"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet":[".xlsx",".xlsm",".xls"]}}],multiple:false});
    fileHandle=h;const file=await h.getFile();const buf=await file.arrayBuffer();
    const wb=window.XLSX.read(buf,{type:"array",cellDates:true});
    XL_DATA=processExcel(wb);xlLastMod=file.lastModified;
    if(XL_DATA){
      document.getElementById("btn-excel").textContent="📊 "+file.name.slice(0,15);
      document.getElementById("btn-excel").style.borderColor="rgba(74,222,128,.7)";
      updateSourceBar();processData();startPollingXL();
      // Salva no Blob para compartilhar com todos os visitantes
      setTimeout(()=>{
        const rows=(APP&&APP.atRows)||[];
        console.log("Rows para upload:",rows.length);
        if(rows.length)uploadToStore(rows,file.name).catch(e=>console.error("Upload erro:",e));
        else console.warn("APP.atRows vazio — processData pode não ter rodado");
      },500);
    }else{
      document.getElementById("btn-excel").textContent="📊 Estrutura inválida";
    }
  }catch(e){
    if(e.name!=="AbortError"){
      console.error("connectExcel error:",e);
      alert("Erro ao carregar planilha: "+e.message);
    }
  }
}
function startPollingXL(){
  if(timerXL)clearInterval(timerXL);
  timerXL=setInterval(async()=>{
    if(!fileHandle)return;
    try{const file=await fileHandle.getFile();if(file.lastModified!==xlLastMod){const buf=await file.arrayBuffer();const wb=window.XLSX.read(buf,{type:"array",cellDates:true});const nd=processExcel(wb);if(nd){XL_DATA=nd;xlLastMod=file.lastModified;processData();updateSyncBadge(true);
          const rows=(APP&&APP.atRows)||[];if(rows.length)uploadToStore(rows,file.name||"Base.xlsx").catch(()=>{});}}}catch(e){}
  },2000);
}

// ── PROCESSAMENTO CENTRAL ──
function processData(){
  if(!CA_DATA&&!XL_DATA)return;

  const cr=CA_DATA?(CA_DATA.cr||[]).map(normalizarCR).filter(r=>r&&r.mes):[];
  const cp=CA_DATA?(CA_DATA.cp||[]).map(normalizarCP).filter(r=>r&&r.mes):[];
  // FC usa normalizadores próprios (data_vencimento, valores pagos/recebidos)
  const crFC=CA_DATA?(CA_DATA.cr||[]).map(normalizarCRfc).filter(r=>r&&r.mes):[];
  const cpFC=CA_DATA?(CA_DATA.cp||[]).map(normalizarCPfc).filter(r=>r&&r.mes):[];

  // Se dados já foram processados (vindos do servidor), usa direto sem re-parsear
  const atRows=XL_DATA?.at?(XL_DATA.preProcessed?XL_DATA.at.filter(r=>r.mes&&r.mes>="2020-01"):XL_DATA.at.map(parseAtRow).filter(r=>r.mes&&r.mes>="2020-01")):[];

  const mesSet=new Set([...cr,...cp,...atRows].map(r=>r.mes).filter(Boolean));
  const allMeses=[...mesSet].sort();
  if(!allMeses.length){console.warn("Nenhum dado encontrado");return;}

  function buildMonth(mes){
    const crM=cr.filter(r=>r.mes===mes),cpM=cp.filter(r=>r.mes===mes),atM=atRows.filter(r=>r.mes===mes);

    // ── RECEITA BRUTA: EXCLUSIVAMENTE do Excel (regime competência) ──
    // rb_excel = coluna "Valor" (bruto, antes de qualquer desconto)
    // desc_excel = coluna "Desconto" (descontos concedidos)
    // rl = coluna "Valor a Receber" = Valor - Desconto (receita bruta líquida de descontos)
    const rb_excel=atM.reduce((a,r)=>a+r.rb,0);      // Receita Bruta (coluna Valor)
    const desc_excel=atM.reduce((a,r)=>a+(r.rb-r.rl),0); // Descontos Concedidos
    const rl=atM.reduce((a,r)=>a+r.rl,0);              // Receita Bruta Líq. (Valor a Receber)
    const hasExcel=atM.length>0;

    // Conta Azul CR: usado APENAS para inadimplência e fluxo de caixa
    const recebido=crM.reduce((a,r)=>a+r.recebido,0);
    const abertoCR=crM.reduce((a,r)=>a+r.aberto,0);

    // ── REPASSE (CUSTO DOS SERVIÇOS): EXCLUSIVAMENTE do Conta Azul (competência) ──
    // Regra: repasse SEMPRE do CA, nunca do Excel
    // Filtra apenas lançamentos classificados como repasse
    const cpRepasses=cpM.filter(r=>r.grupo==="repasse");
    const rep=cpRepasses.reduce((a,r)=>a+r.original,0);

    // ── DESPESAS OPERACIONAIS: Conta Azul (competência) ──
    const sumGrupo=g=>cpM.filter(r=>r.grupo===g).reduce((a,r)=>a+r.original,0);
    const desp_comercial=sumGrupo("comercial");
    const desp_admin=sumGrupo("administrativo");
    const desp_financeiro=sumGrupo("financeiro");
    const rendimentos=sumGrupo("rendimento");
    const emprestimo=sumGrupo("emprestimo");

    // ── DRE ESTRUTURA CORRETA ──
    const imp=calcImpostos(rl);
    const deducoes=imp.pis+imp.cofins+imp.iss; // Deduções fiscais sobre receita
    const rl_liq=rl-deducoes;                  // Receita Líquida (após impostos s/ faturamento)
    const margem_bruta=rl_liq-rep;             // Margem Bruta (era "lucro_bruto")
    const ebitda=margem_bruta-desp_comercial-desp_admin; // EBITDA (era "lucro_operacional")
    const rf=rendimentos-desp_financeiro;      // Resultado Financeiro
    const ebt=ebitda+rf;                        // EBT - antes dos impostos s/ lucro (amortização não é resultado)
    const csll_irpj=imp.csll+imp.irpj+imp.adicional;
    const ll=ebt-csll_irpj;                    // Lucro Líquido

    // Aliases para compatibilidade com código legado
    const lucro_bruto=margem_bruta;
    const lucro_operacional=ebitda;
    const lucro_liquido_antes=ebt+emprestimo;
    const lucro_final=ebt;

    const at=atM.length||crM.length;
    const pacs=new Set(atM.map(r=>r.paciente)).size;

    // Categorias de RECEITA (DRE): Excel quando disponível (col. Valor, por Procedimento)
    const catMap={};
    if(hasExcel && atM.length){
      atM.forEach(r=>{
        const n=r.disc||"Sem categoria";
        if(!catMap[n])catMap[n]={n,faturado:0,recebido:0,aberto:0};
        catMap[n].faturado+=r.rb;   // col. Valor
        catMap[n].recebido+=r.rl;   // col. Valor a Receber
        catMap[n].aberto+=0;
      });
    } else {
      crM.forEach(r=>{if(!catMap[r.cat])catMap[r.cat]={n:r.cat,faturado:0,recebido:0,aberto:0};catMap[r.cat].faturado+=r.faturado;catMap[r.cat].recebido+=r.recebido;catMap[r.cat].aberto+=r.aberto});
    }
    const categorias=Object.values(catMap).sort((a,b)=>b.faturado-a.faturado);

    // Categorias do Conta Azul (para Inadimplência e aba Categorias)
    // Sempre do CA — tem info de recebimento real
    const catCAmap={};
    crM.forEach(r=>{if(!catCAmap[r.cat])catCAmap[r.cat]={n:r.cat,faturado:0,recebido:0,aberto:0};catCAmap[r.cat].faturado+=r.faturado;catCAmap[r.cat].recebido+=r.recebido;catCAmap[r.cat].aberto+=r.aberto});
    const categoriasCA=Object.values(catCAmap).sort((a,b)=>b.faturado-a.faturado);

    // Categorias CP (despesas detalhadas)
    const cpCatMap={};
    cpM.forEach(r=>{const k=r.cat+"|"+r.grupo;if(!cpCatMap[k])cpCatMap[k]={n:r.cat,grupo:r.grupo,valor:0};cpCatMap[k].valor+=r.original});
    const cpCategorias=Object.values(cpCatMap).sort((a,b)=>b.valor-a.valor);

    // Profissionais (Excel)
    const profMap={};
    atM.forEach(r=>{const k=r.prof+"||"+r.disc;if(!profMap[k])profMap[k]={n:r.prof,d:r.disc,rb:0,rl:0,rep:0,at:0};profMap[k].rb+=r.rb;profMap[k].rl+=r.rl;profMap[k].rep+=r.rep;profMap[k].at++});
    const profissionais=Object.values(profMap).map(p=>{const mc2=p.rl-p.rep,i2=calcImpostos(p.rl),ll2=mc2-i2.total;return{...p,mc:mc2,imp:i2.total,ll:ll2,mcP:p.rl>0?mc2/p.rl:0,repP:p.rl>0?p.rep/p.rl:0,llP:p.rl>0?ll2/p.rl:0,tAt:p.at>0?p.rl/p.at:0}}).sort((a,b)=>b.rl-a.rl);

    // Disciplinas (Excel)
    const discMap={};
    atM.forEach(r=>{if(!discMap[r.disc])discMap[r.disc]={n:r.disc,rl:0,rep:0,at:0,pacs:new Set()};discMap[r.disc].rl+=r.rl;discMap[r.disc].rep+=r.rep;discMap[r.disc].at++;discMap[r.disc].pacs.add(r.paciente)});
    const disciplinas=Object.values(discMap).map(d=>{const mc2=d.rl-d.rep,i2=calcImpostos(d.rl),ll2=mc2-i2.total,pac=d.pacs.size;return{n:d.n,rl:d.rl,rep:d.rep,at:d.at,pac,mc:mc2,imp:i2.total,ll:ll2,mcP:d.rl>0?mc2/d.rl:0,repP:d.rl>0?d.rep/d.rl:0,llP:d.rl>0?ll2/d.rl:0,tAt:d.at>0?d.rl/d.at:0,tPac:pac>0?d.rl/pac:0}}).sort((a,b)=>b.rl-a.rl);

    // Famílias (Excel)
    const famMap={};
    atM.forEach(r=>{if(!famMap[r.familia])famMap[r.familia]={n:r.familia,rl:0,at:0,pacs:new Set()};famMap[r.familia].rl+=r.rl;famMap[r.familia].at++;famMap[r.familia].pacs.add(r.paciente)});
    const familias=Object.values(famMap).map(f=>({n:f.n,rl:f.rl,at:f.at,pac:f.pacs.size,tAt:f.at>0?f.rl/f.at:0,tPac:f.pacs.size>0?f.rl/f.pacs.size:0})).sort((a,b)=>b.rl-a.rl);

    return{mes,rl,rb_excel:rb_excel,desc_excel:desc_excel,recebido,abertoCR,rep,desp_comercial,desp_admin,desp_financeiro,rendimentos,emprestimo,rf,ebt,margem_bruta,ebitda,lucro_bruto,lucro_operacional,lucro_liquido_antes,lucro_final,impostos:imp,ll,at,pac:pacs,tAt:at>0?rl/at:0,tPac:pacs>0?rl/pacs:0,categorias,categoriasCA,cpCategorias,profissionais,disciplinas,familias};
  }

  const byMes={};
  allMeses.forEach(m=>{byMes[m]=buildMonth(m)});

  // Recalcula CSLL/IRPJ com base trimestral correta (Lucro Presumido)
  recalcQuarterlyTax(byMes, allMeses);

  // TOTAL (agrega todos os meses)
  const tot={mes:"TOTAL",rl:0,rb_excel:0,desc_excel:0,recebido:0,abertoCR:0,rep:0,desp_comercial:0,desp_admin:0,desp_financeiro:0,rendimentos:0,emprestimo:0,at:0,pac:0};
  allMeses.forEach(m=>{const d=byMes[m];["rl","rb_excel","desc_excel","recebido","abertoCR","rep","desp_comercial","desp_admin","desp_financeiro","rendimentos","emprestimo","at"].forEach(k=>tot[k]+=(d[k]||0))});
  // Pacientes únicos: conta com Set global, não soma por mês
  tot.pac=new Set(atRows.map(r=>r.paciente).filter(Boolean)).size;
  tot.rf=tot.rendimentos-tot.desp_financeiro;
  tot.lucro_bruto=tot.rl-tot.rep;
  tot.lucro_operacional=tot.lucro_bruto-tot.desp_comercial-tot.desp_admin;
  tot.lucro_liquido_antes=tot.lucro_operacional+tot.rf;
  tot.lucro_final=tot.lucro_liquido_antes-tot.emprestimo;
  // TOTAL: soma os impostos já calculados por mês (recalcQuarterlyTax)
  // Não usar calcImpostos(tot.rl) pois tot.rl é soma de múltiplos meses
  const totImpAgg={pis:0,cofins:0,iss:0,csll:0,irpj:0,adicional:0,total:0};
  allMeses.forEach(m=>{const i=byMes[m]?.impostos||{};
    totImpAgg.pis+=(i.pis||0);totImpAgg.cofins+=(i.cofins||0);totImpAgg.iss+=(i.iss||0);
    totImpAgg.csll+=(i.csll||0);totImpAgg.irpj+=(i.irpj||0);totImpAgg.adicional+=(i.adicional||0);
    totImpAgg.total+=(i.total||0);
  });
  tot.impostos=totImpAgg;
  tot.ll=tot.lucro_final-tot.impostos.total;
  tot.tAt=tot.at>0?tot.rl/tot.at:0;
  tot.tPac=tot.pac>0?tot.rl/tot.pac:0;
  // Categorias agregadas
  const totCat={};allMeses.forEach(m=>{(byMes[m].categorias||[]).forEach(c=>{if(!totCat[c.n])totCat[c.n]={n:c.n,faturado:0,recebido:0,aberto:0};totCat[c.n].faturado+=c.faturado;totCat[c.n].recebido+=c.recebido;totCat[c.n].aberto+=c.aberto})});
  tot.categorias=Object.values(totCat).sort((a,b)=>b.faturado-a.faturado);
  // categoriasCA: sempre do CA (para inadimplência)
  const totCatCA={};allMeses.forEach(m=>{(byMes[m].categoriasCA||[]).forEach(c=>{if(!totCatCA[c.n])totCatCA[c.n]={n:c.n,faturado:0,recebido:0,aberto:0};totCatCA[c.n].faturado+=c.faturado;totCatCA[c.n].recebido+=c.recebido;totCatCA[c.n].aberto+=c.aberto})});
  tot.categoriasCA=Object.values(totCatCA).sort((a,b)=>b.faturado-a.faturado);
  const totCpCat={};allMeses.forEach(m=>{(byMes[m].cpCategorias||[]).forEach(c=>{const k=c.n+"|"+c.grupo;if(!totCpCat[k])totCpCat[k]={n:c.n,grupo:c.grupo,valor:0};totCpCat[k].valor+=c.valor})});
  tot.cpCategorias=Object.values(totCpCat).sort((a,b)=>b.valor-a.valor);
  const totProf={};allMeses.forEach(m=>{(byMes[m].profissionais||[]).forEach(p=>{const k=p.n+"||"+p.d;if(!totProf[k])totProf[k]={...p,rb:0,rl:0,rep:0,at:0};totProf[k].rb+=p.rb;totProf[k].rl+=p.rl;totProf[k].rep+=p.rep;totProf[k].at+=p.at})});
  tot.profissionais=Object.values(totProf).map(p=>{const mc2=p.rl-p.rep,i2=calcImpostos(p.rl),ll2=mc2-i2.total;return{...p,mc:mc2,imp:i2.total,ll:ll2,mcP:p.rl>0?mc2/p.rl:0,repP:p.rl>0?p.rep/p.rl:0,llP:p.rl>0?ll2/p.rl:0,tAt:p.at>0?p.rl/p.at:0}}).sort((a,b)=>b.rl-a.rl);
  const totDisc={};allMeses.forEach(m=>{(byMes[m].disciplinas||[]).forEach(d=>{if(!totDisc[d.n])totDisc[d.n]={...d,rl:0,rep:0,at:0,pac:0};totDisc[d.n].rl+=d.rl;totDisc[d.n].rep+=d.rep;totDisc[d.n].at+=d.at;totDisc[d.n].pac+=d.pac})});
  tot.disciplinas=Object.values(totDisc).map(d=>{const mc2=d.rl-d.rep,i2=calcImpostos(d.rl),ll2=mc2-i2.total;return{...d,mc:mc2,imp:i2.total,ll:ll2,mcP:d.rl>0?mc2/d.rl:0,repP:d.rl>0?d.rep/d.rl:0,llP:d.rl>0?ll2/d.rl:0,tAt:d.at>0?d.rl/d.at:0,tPac:d.pac>0?d.rl/d.pac:0}}).sort((a,b)=>b.rl-a.rl);
  // Famílias: rebuild from atRows com Sets para evitar dupla contagem de pacientes
  const totFamMap={};
  atRows.forEach(r=>{
    const fn=r.familia||"Sem família";
    if(!totFamMap[fn])totFamMap[fn]={n:fn,rl:0,at:0,pacs:new Set()};
    totFamMap[fn].rl+=r.rl;totFamMap[fn].at++;totFamMap[fn].pacs.add(r.paciente);
  });
  tot.familias=Object.values(totFamMap).map(f=>({n:f.n,rl:f.rl,at:f.at,pac:f.pacs.size,tAt:f.at>0?f.rl/f.at:0,tPac:f.pacs.size>0?f.rl/f.pacs.size:0})).sort((a,b)=>b.rl-a.rl);
  byMes["TOTAL"]=tot;

  // FC REALIZADO: prioriza Pluggy (extrato bancário com datas reais) sobre CA
  // Se Pluggy não conectado, usa CA com data_vencimento como aproximação
  // Saldo inicial de Dezembro (anterior ao período de análise) — definido globalmente
  // Se Pluggy conectado, usa transações bancárias reais
  // FC: prioriza OFX (extrato bancário real) > CA (data vencimento)
  let fcData;
  const txsOFX = OFX_DATA?.transactions?.length ? OFX_DATA.transactions : null;
  if(txsOFX){
    // OFX: usa datas reais de cada transação bancária
    const ofxMeses=[...new Set(txsOFX.map(t=>toYYYYMM(t.date)).filter(Boolean))].sort();
    let acum=SALDO_INICIAL_DEZ;
    fcData=ofxMeses.map(m=>{
      const messTxs=txsOFX.filter(t=>toYYYYMM(t.date)===m);
      const e=messTxs.filter(t=>t.amount>0).reduce((a,t)=>a+t.amount,0);
      const s=Math.abs(messTxs.filter(t=>t.amount<0).reduce((a,t)=>a+t.amount,0));
      const sm=e-s; acum+=sm;
      return{m:monthLabel(m),mes:m,e,s,sm,ac:acum,fonte:"ofx"};
    });
  } else {
    // Fallback: Conta Azul com data_vencimento
    const fcMeses=[...new Set([...crFC,...cpFC].map(r=>r.mes).filter(Boolean))].sort();
    let acum=SALDO_INICIAL_DEZ;
    fcData=fcMeses.map(m=>{
      const e=crFC.filter(r=>r.mes===m).reduce((a,r)=>a+r.recebido,0);
      const s=cpFC.filter(r=>r.mes===m).reduce((a,r)=>a+r.pago,0);
      const sm=e-s;acum+=sm;
      return{m:monthLabel(m),mes:m,e,s,sm,ac:acum,fonte:"ca"};
    });
  }
  // Projeção: média móvel dos últimos 3 meses reais para cada mês projetado
  if(fcData.length){
    const reais=fcData.filter(r=>!r.projecao&&r.e>0);
    if(reais.length>0){
      let[y,mo]=fcData[fcData.length-1].mes.split("-").map(Number),ac2=fcData[fcData.length-1].ac;
      // Buffer de meses reais que cresce a cada projeção adicionada
      const buffer=[...reais];
      for(let i=0;i<6;i++){
        mo++;if(mo>12){mo=1;y++;}
        const ms=y+"-"+String(mo).padStart(2,"0");
        if(fcData.find(r=>r.mes===ms))continue;
        // Média dos últimos 3 meses disponíveis (reais + projetados anteriores)
        const ultimos3=buffer.slice(-3);
        const avgE=ultimos3.reduce((a,r)=>a+r.e,0)/ultimos3.length;
        const avgS=ultimos3.reduce((a,r)=>a+r.s,0)/ultimos3.length;
        const sm=avgE-avgS;ac2+=sm;
        const novo={m:monthLabel(ms),mes:ms,e:avgE,s:avgS,sm,ac:ac2,projecao:true};
        fcData.push(novo);
        buffer.push(novo); // adiciona ao buffer para próxima iteração
      }
    }
  }

  MESES=allMeses;
  if(CUR_MES!=="TOTAL"&&!MESES.includes(CUR_MES))CUR_MES="TOTAL";
  APP={byMes,allMeses,fcData,atRows,crRows:cr,cpRows:cp};
  buildMesBar();updateHeaderKPIs();updateSyncBadge(true);render();
}

function barH(data,w,rh,lw){w=w||480;rh=rh||24;lw=lw||170;const mx=Math.max(...data.map(d=>Math.abs(d.v||0)))||1,bmax=w-lw-80,h=data.length*rh+6;let s=`<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">`;data.forEach((d,i)=>{const bw=Math.max(2,Math.abs(d.v||0)/mx*bmax),y=i*rh+2;s+=`<text x="${lw-5}" y="${y+rh/2+4}" text-anchor="end" font-size="10" fill="#8b6b5a" font-family="sans-serif">${d.l.length>24?d.l.slice(0,24)+"…":d.l}</text><rect x="${lw}" y="${y+3}" width="${bw}" height="${rh-7}" rx="3" fill="${d.c}" opacity=".9"/><text x="${lw+bw+5}" y="${y+rh/2+4}" font-size="10" fill="#2d1f17" font-family="'Courier New',monospace">${fR(Math.abs(d.v||0))}</text>`});return s+"</svg>"}
function barG(lbls,series,W,H){W=W||720;H=H||260;if(!lbls||!lbls.length)return"<div style='color:var(--muted);text-align:center;padding:20px'>Sem dados</div>";const pL=62,pR=16,pT=14,pB=52,cW=W-pL-pR,cH=H-pT-pB,n=Math.max(1,lbls.length),ns=Math.max(1,series.length);const mx=Math.max(1,...series.flatMap(s=>s.v.map(v=>Math.abs(v||0))))*1.12||1;const bw=Math.min(22,(cW/n-6)/ns),gap=cW/n;let s=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;for(let g=0;g<=4;g++){const yy=pT+cH-g*(cH/4);s+=`<line x1="${pL}" y1="${yy}" x2="${pL+cW}" y2="${yy}" stroke="#f0e4dc" stroke-width="1"/><text x="${pL-3}" y="${yy+4}" text-anchor="end" font-size="9" fill="#c9b5aa" font-family="sans-serif">${fR(mx*g/4)}</text>`}series.forEach((sr,si)=>{sr.v.forEach((v,i)=>{const bh=Math.abs(v)/mx*cH,x=pL+i*gap+(si*bw)+(gap-ns*bw)/2;s+=`<rect x="${x}" y="${pT+cH-bh}" width="${bw-2}" height="${Math.max(bh,1)}" rx="2" fill="${sr.c}" opacity=".9"/>`})});lbls.forEach((l,i)=>{s+=`<text x="${pL+i*gap+gap/2}" y="${pT+cH+13}" text-anchor="middle" font-size="9" fill="#8b6b5a" font-family="sans-serif">${l}</text>`});series.forEach((sr,i)=>{const lx=pL+i*110;s+=`<rect x="${lx}" y="${pT+cH+26}" width="9" height="9" rx="2" fill="${sr.c}" opacity=".9"/><text x="${lx+13}" y="${pT+cH+34}" font-size="10" fill="#8b6b5a" font-family="sans-serif">${sr.nm}</text>`});return s+"</svg>"}
// Sparkline minigráfico inline para DRE
function sparkline(vals, color, w, h){
  w=w||60; h=h||22;
  if(!vals||vals.length<2)return`<svg width="${w}" height="${h}"></svg>`;
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const rng=mx-mn||1;
  const px=i=>Math.round(i*(w-4)/(vals.length-1))+2;
  const py=v=>Math.round(h-2-(v-mn)/rng*(h-4))+0;
  const pts=vals.map((v,i)=>px(i)+","+py(v)).join(" ");
  const last=vals[vals.length-1], prev=vals[vals.length-2];
  const trendColor=last>=prev?"var(--green)":"var(--red)";
  return`<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle">
    <polyline points="${pts}" fill="none" stroke="${color||trendColor}" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="${px(vals.length-1)}" cy="${py(last)}" r="2" fill="${color||trendColor}"/>
  </svg>`;
}

// ── DRE RENDERER ──────────────────────────────────────────────────────────
let DRE_MODE = "normal";

function renderDRE(){
  const el=document.getElementById("sec-dre");
  if(!APP){el.innerHTML=splashHTML();return;}
  const d=getActiveData();if(!d){el.innerHTML=splashHTML();return;}

  const toggleBar=`<div class="dre-toggle">
    <button class="dre-tb${DRE_MODE==="normal"?" a":""}" onclick="setDreMode('normal')">📊 DRE</button>
    <button class="dre-tb${DRE_MODE==="cc"?" a":""}" onclick="setDreMode('cc')">🏢 Centro de Custo</button>
  </div>`;

  if(DRE_MODE==="cc"){el.innerHTML=toggleBar+renderDREbyCostCenter(d);return;}

  const hasExcel=!!XL_DATA;

  // ── Determina meses para comparativo ────────────────────────────────────
  // Usa MESES_SEL (seletor superior) ou mês ativo
  const mesesExib = MESES_SEL.length>0
    ? MESES_SEL
    : (CUR_MES!=="TOTAL"&&!dtFrom&&!dtTo ? [CUR_MES] : null);

  // Sem seleção: DRE do período total
  if(!mesesExib||mesesExib.length===0){
    el.innerHTML=toggleBar+renderDRESingle(d,null,hasExcel);
    return;
  }

  // 1 mês: DRE simples
  if(mesesExib.length===1){
    const md=APP.byMes[mesesExib[0]];
    el.innerHTML=toggleBar+(md?renderDRESingle(md,mesesExib[0],hasExcel):`<div class="no-data">Sem dados para ${monthLabel(mesesExib[0])}</div>`);
    return;
  }

  // 2+ meses: tabela comparativa
  el.innerHTML=toggleBar+renderDREMulti(mesesExib,hasExcel);
}

// ── DRE Período único (original) ──────────────────────────────────────────
function renderDRESingle(d, mes, hasExcel){
  const lbl=mes?monthLabel(mes):"Período Selecionado";

  const rb=d.rb_excel||d.rl;
  const desc=d.desc_excel||0;
  const rl=d.rl;
  const imp=d.impostos||calcImpostos(rl);
  const ded=calcDeducoesFiscais(rl);
  const deducoes=ded.total;
  const rl_liq=rl-deducoes;
  const rep=d.rep;
  const margem_bruta=rl_liq-rep;
  const desp_comercial=d.desp_comercial||0;
  const desp_admin=d.desp_admin||0;
  const ebitda=margem_bruta-desp_comercial-desp_admin;
  const rendVal=d.rendimentos||0;
  const finVal=d.desp_financeiro||0;
  const rf=rendVal-finVal;
  const ebt=ebitda+rf;
  const csll_irpj=(imp.csll||0)+(imp.irpj||0)+(imp.adicional||0);
  const ll=ebt-csll_irpj;

  const alerts=[];
  if(ll<0)alerts.push({tipo:"red",msg:`Lucro Líquido negativo: ${fR(ll)} — despesas superam receita líquida`});
  if(rb>0&&margem_bruta/rb<0.3)alerts.push({tipo:"yellow",msg:`Margem Bruta baixa (${fP(margem_bruta/rb)}) — repasses elevados`});
  if(!hasExcel)alerts.push({tipo:"red",msg:`⚠ Excel não conectado — Receita Bruta indisponível`});

  const cpCats=d.cpCategorias||[];
  const comerciais=cpCats.filter(c=>c.grupo==="comercial");
  const admins=cpCats.filter(c=>c.grupo==="administrativo");
  const rendimentos_cats=cpCats.filter(c=>c.grupo==="rendimento");
  const financeiros=cpCats.filter(c=>c.grupo==="financeiro");
  const recCats=d.categorias||[];

  // Função drill-down row
  const sec=(id,label,val,color,children)=>{
    const pct=rb>0?val/rb:0;
    const hasKids=children&&children.length>0;
    const icon=hasKids?`<span id="ico-${id}" style="font-size:10px;margin-right:4px;opacity:.5">▶</span>`:"  ";
    const click=hasKids?`onclick="dreDrill('${id}')" style="cursor:pointer"`:"";
    return`<tr class="dre-main" ${click}>
      <td style="font-weight:700;color:${color||"var(--text)"};padding-left:8px;font-size:12px">${icon}${label}</td>
      <td class="r mn" style="color:${color||"var(--text)"};font-weight:600">${fR(val)}</td>
      <td class="r" style="color:var(--muted);font-size:10px">${fP(pct)}</td>
    </tr>
    ${hasKids?`<tr id="dr-${id}" style="display:none"><td colspan="3" style="padding:0">
      <table style="width:100%;background:var(--hover)">
      ${children.map(c=>`<tr>
        <td style="font-size:10px;color:var(--muted);padding-left:28px">↳ ${c.l}</td>
        <td class="r mn" style="font-size:10px;color:var(--muted)">${fR(c.v)}</td>
        <td class="r" style="font-size:10px;color:var(--subtle)">${fP(rb>0?c.v/rb:0)}</td>
      </tr>`).join("")}
      </table></td></tr>`:""}`;
  };
  const sep=()=>`<tr class="dsp"><td colspan="3"></td></tr>`;

  return`
  ${alerts.map(a=>`<div class="alrt ${a.tipo}">⚠ ${a.msg}</div>`).join("")}
  <div class="cards">
    ${kCard("Receita Bruta",fR(rb),"","var(--blue)",hasExcel?d.at+" atend.":"⚠ Requer Excel")}
    ${kCard("Receita Líquida",fR(rl_liq),fP(rb>0?rl_liq/rb:0),"var(--brand)","Após desc. e impostos")}
    ${kCard("Margem Bruta",fR(margem_bruta),fP(rb>0?margem_bruta/rb:0),margem_bruta>=0?"var(--gold)":"var(--red)","Após repasses")}
    ${kCard("EBITDA",fR(ebitda),fP(rb>0?ebitda/rb:0),ebitda>=0?"var(--blue)":"var(--red)","Res. Operacional")}
    ${kCard("EBT",fR(ebt),fP(rb>0?ebt/rb:0),ebt>=0?"var(--blue)":"var(--red)","Antes dos impostos")}
    ${kCard("Lucro Líquido",fR(ll),fP(rb>0?ll/rb:0),ll>=0?"var(--green)":"var(--red)","Após CSLL/IRPJ")}
  </div>
  <div class="src-info">📊 Receita: Excel · Repasses e Despesas: Conta Azul (competência)</div>
  <div class="prow">
    <div class="panel" style="flex:2"><div class="pt">DRE — ${lbl} <span class="pt-badge">Competência</span>
      <span style="font-size:10px;color:var(--muted);float:right;font-weight:400">Clique nas linhas ▶ para expandir</span>
    </div>
    <div class="tw"><table style="width:100%">
      <thead><tr><th>Linha</th><th class="r">Valor</th><th class="r" style="font-size:10px">AV%</th></tr></thead>
      <tbody>
      ${sec("rb","01 RECEITA BRUTA",rb,"var(--blue)",recCats.map(c=>({l:c.n,v:c.faturado})))}
      ${sep()}
      ${sec("ded","02 DEDUÇÕES",-(desc+deducoes),null,[
        ...(desc>0?[{l:"(–) Descontos Concedidos",v:-desc}]:[]),
        {l:"(–) PIS 0,65%",v:-imp.pis},{l:"(–) COFINS 3,0%",v:-imp.cofins},{l:"(–) ISS 5,0%",v:-imp.iss}
      ])}
      <tr class="dsp"><td colspan="3"></td></tr>
      <tr><td style="font-weight:700;padding-left:8px;font-size:12px;color:var(--brand)">= RECEITA LÍQUIDA</td><td class="r mn" style="color:var(--brand);font-weight:600">${fR(rl_liq)}</td><td class="r" style="font-size:10px;color:var(--muted)">${fP(rb>0?rl_liq/rb:0)}</td></tr>
      ${sep()}
      ${sec("rep","03 REPASSES (Custo Serviços)",-rep,"var(--red)",cpCats.filter(c=>c.grupo==="repasse").map(c=>({l:c.n,v:-c.valor})))}
      <tr><td style="font-weight:700;padding-left:8px;font-size:12px;color:${margem_bruta>=0?"var(--gold)":"var(--red)"}"  >= MARGEM BRUTA</td><td class="r mn" style="color:${margem_bruta>=0?"var(--gold)":"var(--red)"};font-weight:600">${fR(margem_bruta)}</td><td class="r" style="font-size:10px;color:var(--muted)">${fP(rb>0?margem_bruta/rb:0)}</td></tr>
      ${sep()}
      ${sec("dcom","04.1 DESPESAS COMERCIAIS",-desp_comercial,"var(--red)",comerciais.map(c=>({l:c.n,v:-c.valor})))}
      ${sec("dadm","04.2 DESPESAS ADMINISTRATIVAS",-desp_admin,"var(--red)",admins.map(c=>({l:c.n,v:-c.valor})))}
      <tr><td style="font-weight:700;padding-left:8px;font-size:12px;color:${ebitda>=0?"var(--blue)":"var(--red)"}">= EBITDA</td><td class="r mn" style="color:${ebitda>=0?"var(--blue)":"var(--red)"};font-weight:600">${fR(ebitda)}</td><td class="r" style="font-size:10px;color:var(--muted)">${fP(rb>0?ebitda/rb:0)}</td></tr>
      ${sep()}
      ${sec("rfin","05 RESULTADO FINANCEIRO",rf,"var(--muted)",[...rendimentos_cats.map(c=>({l:c.n,v:c.valor})),...financeiros.map(c=>({l:c.n,v:-c.valor}))])}

      <tr class="dsp"><td colspan="3"></td></tr>
      <tr><td style="font-weight:700;padding-left:8px;font-size:12px;color:${ebt>=0?"var(--blue)":"var(--red)"}">= EBT (ANTES DOS IMPOSTOS)</td><td class="r mn" style="color:${ebt>=0?"var(--blue)":"var(--red)"};font-weight:600">${fR(ebt)}</td><td class="r" style="font-size:10px;color:var(--muted)">${fP(rb>0?ebt/rb:0)}</td></tr>
      ${sec("impo","CSLL / IRPJ (provisão)",-csll_irpj,"var(--muted)",[{l:"(–) CSLL 9%÷3",v:-imp.csll},{l:"(–) IRPJ 15%÷3",v:-imp.irpj},{l:"(–) IRPJ Adicional",v:-imp.adicional}])}
      ${sep()}
      <tr><td style="font-weight:700;padding-left:8px;font-size:12px;color:${ll>=0?"var(--green)":"var(--red)"}">= LUCRO LÍQUIDO</td><td class="r mn" style="color:${ll>=0?"var(--green)":"var(--red)"};font-weight:600">${fR(ll)}</td><td class="r" style="font-size:10px;color:var(--muted)">${fP(rb>0?ll/rb:0)}</td></tr>
      </tbody>
    </table></div>
    <p class="note">ℹ Receita: regime competência (Excel). Custos: competência (Conta Azul). Impostos: provisão Lucro Presumido.</p>
    </div>
    <div class="panel" style="flex:1">
      <div class="pt">Receita por Serviço <span class="pt-badge">Excel</span></div>
      <div class="cwrap">${barH(recCats.slice(0,12).map((c,i)=>({l:c.n,v:c.faturado,c:COLS[i%16]})),330)}</div>
      <div class="pt" style="margin-top:12px">Composição das Despesas <span class="pt-badge">Conta Azul</span></div>
      <div class="cwrap">${barH([
        {l:"Repasses",v:rep,c:"var(--red)"},
        {l:"Desp. Admin.",v:desp_admin,c:"#f97316"},
        {l:"Desp. Comercial",v:desp_comercial,c:"#eab308"},
        {l:"Desp. Financeira",v:finVal,c:"#a78bfa"},
        {l:"CSLL/IRPJ",v:csll_irpj,c:"var(--muted)"},
      ].filter(x=>x.v>0),330)}</div>
    </div>
  </div>`;
}

// ── DRE Multi-colunas (comparativo) ───────────────────────────────────────
function renderDREMulti(meses, hasExcel){
  // Prepara dados de cada mês
  const cols=meses.map(m=>{
    const md=APP.byMes[m];if(!md)return null;
    const rb=md.rb_excel||md.rl;
    const desc=md.desc_excel||0;
    const rl=md.rl;
    const ded=calcDeducoesFiscais(rl);
    const rl_liq=rl-ded.total;
    const rep=md.rep;
    const mb=rl_liq-rep;
    const dc=md.desp_comercial||0, da=md.desp_admin||0;
    const ebitda=mb-dc-da;
    const rf=(md.rendimentos||0)-(md.desp_financeiro||0);
    const ebt=ebitda+rf;
    const imp=md.impostos||{csll:0,irpj:0,adicional:0};
    const csll_irpj=(imp.csll||0)+(imp.irpj||0)+(imp.adicional||0);
    const ll=ebt-csll_irpj;
    return{m,rb,desc,rl,rl_liq,rep,mb,dc,da,ebitda,rf,ebt,csll_irpj,ll,imp,
      cats:md.categorias||[], cpCats:md.cpCategorias||[], at:md.at||0};
  }).filter(Boolean);

  if(!cols.length)return`<div class="no-data">Sem dados para os meses selecionados</div>`;

  // Variação % entre primeiro e último mês selecionado
  const varPct=(a,b)=>b&&b!==0?((a-b)/Math.abs(b)):null;
  const varSpan=(cur,prev,inv)=>{
    const v=varPct(cur,prev);
    if(v===null||prev===0)return"";
    const pos=inv?v<0:v>0;
    return`<span style="font-size:9px;color:${pos?"var(--green)":"var(--red)"}">${v>0?"▲":"▼"}${Math.abs(v*100).toFixed(1)}%</span>`;
  };

  // Cabeçalho
  const nCols=cols.length;
  const colW=Math.floor(520/nCols);
  let thead=`<thead><tr><th style="min-width:180px">Linha</th>`;
  cols.forEach((c,i)=>{
    thead+=`<th class="r" style="width:${colW}px">${monthLabel(c.m)}</th>`;
    thead+=`<th class="r" style="width:38px;font-size:9px;color:var(--muted)">AV%</th>`;
    if(i>0)thead+=`<th class="r" style="width:50px;font-size:9px;color:var(--muted)">Var%</th>`;
  });
  thead+=`</tr></thead>`;

  // Linha de dados
  const row=(label,fn,color,bold,sep)=>{
    let r=`<tr class="${sep?"dsp":""}"><td style="font-weight:${bold?700:400};color:${color||"var(--text)"};padding-left:8px;font-size:${bold?12:11}px">${label}</td>`;
    cols.forEach((c,i)=>{
      const v=fn(c);
      const rb=c.rb||1;
      r+=`<td class="r mn" style="color:${color||"var(--text)"};font-weight:${bold?600:400}">${fR(v)}</td>`;
      r+=`<td class="r" style="font-size:9px;color:var(--muted)">${fP(rb>0?v/rb:0)}</td>`;
      if(i>0){
        const prev=fn(cols[i-1]);
        r+=`<td class="r" style="font-size:9px">${varSpan(v,prev,v<0)}</td>`;
      }
    });
    return r+`</tr>`;
  };

  // Linha com subcategorias por mês
  const rowSub=(label,fn,color)=>{
    let r=`<tr><td style="font-size:10px;color:${color||"var(--muted)"};padding-left:24px">↳ ${label}</td>`;
    cols.forEach((c,i)=>{
      const v=fn(c);
      const rb=c.rb||1;
      r+=`<td class="r mn" style="font-size:10px;color:${color||"var(--muted)"}">${fR(v)}</td>`;
      r+=`<td class="r" style="font-size:9px;color:var(--subtle)">${fP(rb>0?v/rb:0)}</td>`;
      if(i>0){
        const prev=fn(cols[i-1]);
        r+=`<td class="r" style="font-size:9px">${varSpan(v,prev,v<0)}</td>`;
      }
    });
    return r+`</tr>`;
  };

  const sep=()=>`<tr class="dsp"><td colspan="${1+nCols+(nCols-1)}"></td></tr>`;

  // Todas as categorias únicas
  const allRecCats=[...new Set(cols.flatMap(c=>c.cats.map(x=>x.n)))];
  const allRepasses=[...new Set(cols.flatMap(c=>c.cpCats.filter(x=>x.grupo==="repasse").map(x=>x.n)))];
  const allComercial=[...new Set(cols.flatMap(c=>c.cpCats.filter(x=>x.grupo==="comercial").map(x=>x.n)))];
  const allAdmin=[...new Set(cols.flatMap(c=>c.cpCats.filter(x=>x.grupo==="administrativo").map(x=>x.n)))];
  const allFin=[...new Set(cols.flatMap(c=>c.cpCats.filter(x=>x.grupo==="financeiro").map(x=>x.n)))];

  const allRend=[...new Set(cols.flatMap(c=>c.cpCats.filter(x=>x.grupo==="rendimento").map(x=>x.n)))];

  const getCat=(c,cats,n)=>(cats?cats.find(x=>x.n===n)?.faturado:0)||0;
  const getCpCat=(c,n)=>c.cpCats.find(x=>x.n===n)?.valor||0;

  return`
  <div class="src-info">📊 Selecione até 6 meses para comparar · Receita: Excel · Despesas: Conta Azul (competência)</div>
  <div class="panel"><div class="pt">DRE Comparativa — ${cols.map(c=>monthLabel(c.m)).join(" × ")} <span class="pt-badge">Competência</span></div>
  <div class="tw" style="overflow-x:auto"><table style="width:100%;min-width:${180+nCols*(colW+90)}px">
  ${thead}<tbody>
  ${row("01 RECEITA BRUTA",c=>c.rb,"var(--blue)",true)}
  ${allRecCats.map(n=>rowSub(n,c=>getCat(c,c.cats,n))).join("")}
  ${sep()}
  ${row("02 DEDUÇÕES",c=>-(c.desc+(c.imp.pis+c.imp.cofins+c.imp.iss)),"var(--red)",true)}
  ${row("= RECEITA LÍQUIDA",c=>c.rl_liq,"var(--brand)",true)}
  ${sep()}
  ${row("03 REPASSES",c=>-c.rep,"var(--red)",true)}
  ${allRepasses.map(n=>rowSub(n,c=>-getCpCat(c,n))).join("")}
  ${row("= MARGEM BRUTA",c=>c.mb,null,true)}
  ${sep()}
  ${row("04.1 DESPESAS COMERCIAIS",c=>-c.dc,"var(--red)",true)}
  ${allComercial.map(n=>rowSub(n,c=>-getCpCat(c,n))).join("")}
  ${row("04.2 DESPESAS ADMINISTRATIVAS",c=>-c.da,"var(--red)",true)}
  ${allAdmin.map(n=>rowSub(n,c=>-getCpCat(c,n))).join("")}
  ${row("= EBITDA",c=>c.ebitda,null,true)}
  ${sep()}
  ${row("05 RESULTADO FINANCEIRO",c=>c.rf,"var(--muted)",true)}
  ${allRend.map(n=>rowSub(n,c=>getCpCat(c,n))).join("")}
  ${allFin.map(n=>rowSub(n,c=>-getCpCat(c,n))).join("")}
  ${sep()}
  ${row("= EBT (ANTES DOS IMPOSTOS)",c=>c.ebt,null,true)}
  ${row("(–) CSLL/IRPJ (provisão)",c=>-c.csll_irpj,"var(--muted)",false)}
  ${sep()}
  ${row("= LUCRO LÍQUIDO",c=>c.ll,null,true)}
  </tbody></table></div></div>`;
}


function renderDREbyCostCenter(d){
  // ── RECEITA: Excel (coluna Procedimento = Centro de Custo) ───────────────
  const ccMap={};
  const mesesAtivos = getActiveMeses();

  // Filtra atRows pelo período ativo (considera MESES_SEL da DRE)
  const atRows = (APP?.atRows||[]).filter(r=>{
    if(!r.mes)return false;
    // DRE multi-select
    if(MESES_SEL.length>0)return MESES_SEL.includes(r.mes);
    if(CUR_MES!=="TOTAL"&&!dtFrom&&!dtTo)return r.mes===CUR_MES;
    if(dtFrom&&r.mes<dtFrom)return false;
    if(dtTo&&r.mes>dtTo)return false;
    return true;
  });

  // Agrupa receita por Procedimento (col. C do Excel)
  atRows.forEach(r=>{
    const n=r.disc||"Sem Procedimento";
    if(!ccMap[n])ccMap[n]={n,rb:0,rl:0,rep:0,desp_admin:0,desp_comercial:0,desp_fin:0,rend:0,emp:0};
    ccMap[n].rb+=r.rb||0;
    ccMap[n].rl+=r.rl||0;
  });

  // ── REPASSE + DESPESAS + RES. FIN.: Conta Azul (CC do sistema, competência) ──
  (CA_DATA?.cp||[]).forEach(item=>{
    const mes=toYYYYMM(item.data_competencia);
    if(!mes)return;
    if(MESES_SEL.length>0&&!MESES_SEL.includes(mes))return;
    else if(MESES_SEL.length===0){
      if(CUR_MES!=="TOTAL"&&!dtFrom&&!dtTo&&mes!==CUR_MES)return;
      if(dtFrom&&mes<dtFrom)return;
      if(dtTo&&mes>dtTo)return;
    }

    const grupo=getGrupoCp(item.categorias?.[0]?.nome||item.descricao||"");
    const val=toNum(item.total||0);

    // Usa centros_de_custo do CA quando disponível
    const ccs=item.centros_de_custo&&item.centros_de_custo.length
      ? item.centros_de_custo
      : [{nome:"Sem Centro de Custo"}];

    ccs.forEach(cc=>{
      const n=cc.nome||"Sem Centro de Custo";
      // Para repasses: associa ao CC do CA
      // Para despesas adm/comercial/fin: distribui ao CC do CA
      if(!ccMap[n])ccMap[n]={n,rb:0,rl:0,rep:0,desp_admin:0,desp_comercial:0,desp_fin:0,rend:0,emp:0};
      if(grupo==="repasse")ccMap[n].rep+=val;
      else if(grupo==="comercial")ccMap[n].desp_comercial+=val;
      else if(grupo==="financeiro")ccMap[n].desp_fin+=val;
      else if(grupo==="rendimento")ccMap[n].rend+=val;
      else if(grupo==="emprestimo")ccMap[n].emp+=val;
      else ccMap[n].desp_admin+=val;
    });
  });

  const ccs=Object.values(ccMap).sort((a,b)=>b.rb-a.rb);
  if(!ccs.length)return`<div class="no-data">Nenhum dado encontrado.<br>
    <span style="font-size:11px;color:var(--muted)">Conecte o Excel para ver receita por procedimento e o Conta Azul para ver custos por centro de custo.</span></div>`;

  const totRb=ccs.reduce((a,c)=>a+c.rb,0);

  // Recalcula CSLL/IRPJ trimestral para o total
  const totalMeses = mesesAtivos.length || 1;
  const rb_trim = totRb * (3 / totalMeses); // aproxima trimestre
  const imp_tot = calcCsllIrpj(rb_trim);

  const rows=ccs.map(cc=>{
    const ded=calcDeducoesFiscais(cc.rl);
    const rl_liq=cc.rl-ded.total;
    const lb=rl_liq-cc.rep;
    const lo=lb-cc.desp_comercial-cc.desp_admin;
    const rf=cc.rend-cc.desp_fin;
    const ebt=lo+rf-cc.emp;
    // Provisão de imposto proporcional à receita do CC
    const proporcao=totRb>0?cc.rb/totRb:0;
    const csll_irpj=(imp_tot.csll+imp_tot.irpj+imp_tot.adicional)/totalMeses*proporcao;
    const ll=ebt-csll_irpj;
    return{...cc,ded:ded.total,rl_liq,lb,lo,rf,ebt,ll,csll_irpj};
  });

  // Totais
  const tot=rows.reduce((a,r)=>({
    rb:a.rb+r.rb, ded:a.ded+r.ded, rl_liq:a.rl_liq+r.rl_liq,
    rep:a.rep+r.rep, lb:a.lb+r.lb, desp_admin:a.desp_admin+r.desp_admin,
    desp_comercial:a.desp_comercial+r.desp_comercial, lo:a.lo+r.lo,
    rf:a.rf+r.rf, ebt:a.ebt+r.ebt, csll_irpj:a.csll_irpj+r.csll_irpj, ll:a.ll+r.ll
  }),{rb:0,ded:0,rl_liq:0,rep:0,lb:0,desp_admin:0,desp_comercial:0,lo:0,rf:0,ebt:0,csll_irpj:0,ll:0});

  const hasExcel=atRows.length>0;
  const hasCA=!!CA_DATA;

  return`
  <div class="src-info">📊 Receita: ${hasExcel?"Excel · col. Procedimento":"⚠ Excel não conectado"} · Repasses e Despesas: ${hasCA?"Conta Azul · centro de custo · competência":"⚠ Conta Azul não conectado"}</div>
  <div class="panel"><div class="pt">DRE por Centro de Custo</div>
  <div class="tw" style="overflow-x:auto"><table><thead><tr>
    <th>Centro de Custo</th>
    <th class="r">Rec.Bruta</th>
    <th class="r">Deduções</th>

  </div>
  <div class="panel"><div class="pt">Provisão Mensal <span class="pt-badge">Lucro Presumido</span></div>
  <div class="tw"><table><thead><tr><th>Mês</th><th class="r">Receita</th><th class="r">PIS</th><th class="r">COFINS</th><th class="r">ISS</th><th class="r">CSLL</th><th class="r">IRPJ</th><th class="r">Adic.</th><th class="r">Total</th><th class="r">%</th></tr></thead><tbody>
  ${monthly.map(r=>`<tr><td class="b">${r.m}</td><td class="r mn">${fR(r.rl)}</td><td class="r mn">${fR(r.pis)}</td><td class="r mn">${fR(r.cofins)}</td><td class="r mn">${fR(r.iss)}</td><td class="r mn">${fR(r.csll)}</td><td class="r mn">${fR(r.irpj)}</td><td class="r mn">${fR(r.adic)}</td><td class="r mn b rd">${fR(r.total)}</td><td class="r">${bdg(r.rl>0?r.total/r.rl:0)}</td></tr>`).join("")}
  </tbody></table></div><p class="note">⚠ CSLL e IRPJ apurados trimestralmente. Confirme sempre com seu contador.</p></div>`;
}

function render(){
  try{
    if(!APP){
      const el=document.getElementById("sec-"+CUR_TAB);
      if(el)el.innerHTML=isLoadingCA
        ?'<div class="spinner-wrap"><div class="spinner"></div><p style="font-size:13px;color:var(--muted)">Carregando dados do Conta Azul…</p></div>'
        :splashHTML();
      return;
    }
    if(CUR_TAB==="dre")        renderDRE();
    else if(CUR_TAB==="ticket")     renderTicket();
    else if(CUR_TAB==="prof")       renderProf();
    else if(CUR_TAB==="disc")       renderDisc();
    else if(CUR_TAB==="cat")        renderCat();
    else if(CUR_TAB==="fluxo")      renderFluxo();
    else if(CUR_TAB==="inadimp")    renderInadimp();
    else if(CUR_TAB==="impostos")   renderImpostos();
  }catch(e){console.error("Render error:",e);const el=document.getElementById("sec-"+CUR_TAB);if(el)el.innerHTML=`<div class="err-box"><b>Erro interno:</b> ${e.message}</div>`;}
}

function updateHeaderKPIs(){
  if(!APP||!APP.byMes)return;
  const d=getActiveData();if(!d)return;
  const imp=d.impostos||calcImpostos(d.rl||0);
  const rb_hdr=(d.rb_excel||d.rl||0);
  document.getElementById("hkpis").innerHTML=`<div class="hk"><div class="hkl">Receita</div><div class="hkv">${fR(rb_hdr)}</div></div><div class="hk"><div class="hkl">L.Bruto</div><div class="hkv">${fR(d.lucro_bruto||d.rl-d.rep||0)}</div></div><div class="hk"><div class="hkl">Impostos</div><div class="hkv">${fR(imp.total||0)}</div></div><div class="hk"><div class="hkl">Resultado</div><div class="hkv">${fR(d.ll||0)}</div></div>`;
}
function buildMesBar(){
  const c=document.getElementById("mes-btns");if(!c)return;
  if(!MESES.length){c.innerHTML='<button class="mfb a">—</button>';return;}
  const mesesVisiveis=MESES.filter(m=>!m.endsWith("-12"));
  const isDRE=CUR_TAB==="dre";
  if(isDRE){
    // Modo DRE: multi-select com hint
    let h=`<span style="font-size:10px;color:var(--muted);margin-right:6px">Selecione até 6 meses:</span>`;
    h+=`<button class="mfb${MESES_SEL.length===0?" a":""}" onclick="setMesDRE('TOTAL')">📅 Total</button>`;
    mesesVisiveis.forEach(m=>{
      const sel=MESES_SEL.includes(m);
      h+=`<button class="mfb${sel?" a":""}" onclick="setMesDRE('${m}')">${monthLabel(m)}</button>`;
    });
    c.innerHTML=h;
  } else {
    // Outras abas: single select
    let h=`<button class="mfb${CUR_MES==="TOTAL"&&!dtFrom&&!dtTo?" a":""}" onclick="setMes('TOTAL',this)">📅 Total</button>`;
    mesesVisiveis.forEach(m=>{h+=`<button class="mfb${CUR_MES===m&&!dtFrom&&!dtTo?" a":""}" onclick="setMes('${m}',this)">${monthLabel(m)}</button>`});
    c.innerHTML=h;
  }
}

function setMesDRE(mes){
  if(mes==="TOTAL"){MESES_SEL=[];renderDRE();buildMesBar();return;}
  const idx=MESES_SEL.indexOf(mes);
  if(idx>=0)MESES_SEL.splice(idx,1);
  else if(MESES_SEL.length<6)MESES_SEL.push(mes);
  MESES_SEL.sort();
  renderDRE();buildMesBar();
}
function updateSourceBar(){
  const hasCA=!!CA_DATA,hasXL=!!XL_DATA;
  document.getElementById("dot-ca").className="src-dot"+(hasCA?" ok":"");
  document.getElementById("dot-xl").className="src-dot"+(hasXL?" ok":"");
  const p=[];if(hasCA)p.push("Conta Azul ✓");
  if(hasXL){p.push(xlUploaded&&!fileHandle?"Excel (servidor)":"Excel ✓ (live 2s)");}
  if(pluggyConnected)p.push("Banco (Pluggy) ✓");
  document.getElementById("src-detail").textContent=p.length?p.join(" · "):"Nenhuma fonte conectada";
}
function updateSyncBadge(ok){
  const b=document.getElementById("sync-badge"),dot=document.getElementById("sync-dot"),txt=document.getElementById("sync-txt");
  b.style.display="flex";dot.className=ok?"live":"err";
  txt.textContent=ok?"Atualizado "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"Erro";
  txt.style.color=ok?"rgba(255,255,255,.9)":"#f87171";
}
function showTab(id,btn){document.querySelectorAll(".sec").forEach(s=>s.classList.remove("a"));document.querySelectorAll(".tb").forEach(b=>b.classList.remove("a"));document.getElementById("sec-"+id).classList.add("a");btn.classList.add("a");CUR_TAB=id;if(id==="dre")MESES_SEL=[];render();buildMesBar();}
function setMes(m,btn){
  CUR_MES=m;dtFrom=null;dtTo=null;
  document.getElementById("dt-from").value="";document.getElementById("dt-to").value="";
  document.querySelectorAll(".mfb").forEach(b=>b.classList.remove("a"));btn.classList.add("a");
  updateHeaderKPIs();render();
}
function applyDateFilter(){
  dtFrom=document.getElementById("dt-from").value||null;
  dtTo=document.getElementById("dt-to").value||null;
  if(dtFrom||dtTo){CUR_MES="TOTAL";document.querySelectorAll(".mfb").forEach(b=>b.classList.remove("a"));}
  updateHeaderKPIs();render();
}
function clearDateFilter(){
  dtFrom=null;dtTo=null;CUR_MES="TOTAL";
  document.getElementById("dt-from").value="";document.getElementById("dt-to").value="";
  document.querySelectorAll(".mfb").forEach(b=>b.classList.remove("a"));
  const totBtn=document.querySelector(".mfb");if(totBtn)totBtn.classList.add("a");
  updateHeaderKPIs();render();
}
window.setProfDisc=function(d,btn){PROF_DISC=d;document.querySelectorAll(".fb").forEach(b=>b.classList.remove("a"));btn.classList.add("a");renderProf()};
async function startAuth(){try{const r=await fetch(API+"?action=auth_url");const{url}=await r.json();window.location.href=url;}catch(e){console.error(e);}}
async function logout(){
  await fetch(API+"?action=logout");CA_DATA=null;XL_DATA=null;APP=null;MESES=[];CUR_MES="TOTAL";dtFrom=null;dtTo=null;
  if(pollTimer)clearInterval(pollTimer);if(timerXL)clearInterval(timerXL);fileHandle=null;xlLastMod=null;
  document.getElementById("btn-ca").textContent="⚡ Conta Azul";document.getElementById("btn-ca").style.borderColor="";
  document.getElementById("btn-excel").textContent="📊 Excel";document.getElementById("btn-excel").style.borderColor="";
  document.getElementById("btn-logout").style.display="none";document.getElementById("sync-badge").style.display="none";
  document.getElementById("hkpis").innerHTML="";updateSourceBar();buildMesBar();render();
}
async function loadCA(isRefresh){
  try{
    const r=await fetch(API+"?action=data");
    if(r.status===401){if(!isRefresh)render();return;}
    if(!r.ok)throw new Error("HTTP "+r.status);
    const raw=await r.json();if(raw.error)throw new Error(raw.error);
    CA_DATA=raw;updateSourceBar();processData();
    document.getElementById("btn-ca").textContent="⚡ CA ✓";
    document.getElementById("btn-ca").style.borderColor="rgba(74,222,128,.7)";
    document.getElementById("btn-logout").style.display="flex";
  }catch(e){console.error(e);isLoadingCA=false;updateSyncBadge(false);if(!isRefresh){const el=document.getElementById("sec-dre");if(el)el.innerHTML=`<div class="err-box"><b>Erro:</b> ${e.message}</div>`;}}
}
function startPollingCA(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(()=>loadCA(true),POLL_MS);}
(async()=>{
  buildMesBar();render();
  const params=new URLSearchParams(location.search);
  if(params.toString())history.replaceState({},"","/");
  // 1. Tenta carregar dados da planilha do servidor (compartilhado)
  const hasStoreData=await loadFromStore();
  if(hasStoreData){updateSourceBar();processData();}
  // 2. Carrega extrato OFX do servidor (se já foi carregado antes)
  loadOFXFromServer().catch(()=>{});
  // 3. Verifica autenticação Conta Azul
  try{
    const r=await fetch(API+"?action=check");
    const{authenticated}=await r.json();
    if(authenticated){
      isLoadingCA=true;render();
      await loadCA(false);
      isLoadingCA=false;
      startPollingCA();
    }
    else if(!hasStoreData){render();}
  }catch{if(!hasStoreData)render();}
})();

</script>
</body>
</html>
